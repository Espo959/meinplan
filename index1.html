<!DOCTYPE html>

<meta charset="UTF-8">

body{background:#1e293b;font-family:system-ui,sans-serif}

  height:100vh;color:#fff;gap:16px;font-size:16px}

<div id="root" style="display:none;width:100%;height:100%"></div>

<script>
function showErr(msg) {
  document.getElementById('loading').innerHTML =
    '<div style="color:#ef4444;padding:20px;font-size:14px">' + msg + '</div>';
}

function startApp() {
  try {
    var useState = React.useState;
    var useRef = React.useRef;
    var useEffect = React.useEffect;

const _jsxFileName = ""; function _nullishCoalesce(lhs, rhsFn) { if (lhs != null) { return lhs; } else { return rhsFn(); } } function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }
// ── Math helpers ──────────────────────────────────────────────
function w2s(wx,wy,pan,zoom){return{x:wx*zoom+pan.x,y:wy*zoom+pan.y};}
function s2w(sx,sy,pan,zoom){return{x:(sx-pan.x)/zoom,y:(sy-pan.y)/zoom};}
function snapG(v,g){return Math.round(v/g)*g;}
function toKS(wx,wy,ks){return{x:Math.round(wx-ks.x),y:Math.round(wy-ks.y)};}
function fromKS(rx,ry,ks){return{x:rx+ks.x,y:ry+ks.y};}
function mmLen(a,b){return Math.round(Math.hypot(b.x-a.x,b.y-a.y));}
function clone(x){return JSON.parse(JSON.stringify(x));}

// Point-in-polygon (ray casting)
function pointInPoly(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// Build SVG path with rounded corners
function buildPath(pts,closed,pan,zoom){
  if(!pts||pts.length<2)return"";
  const ss=pts.map(p=>w2s(p.x,p.y,pan,zoom));
  const n=pts.length;
  function unit(a,b){const dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy);return l===0?{x:0,y:0}:{x:dx/l,y:dy/l};}
  let d="";
  if(closed){
    for(let i=0;i<n;i++){
      const prev=ss[(i-1+n)%n],curr=ss[i],next=ss[(i+1)%n];
      const r=Math.min((_nullishCoalesce(pts[i].r, () => (0)))*zoom,Math.hypot(curr.x-prev.x,curr.y-prev.y)/2,Math.hypot(curr.x-next.x,curr.y-next.y)/2);
      if(r>0){
        const u1=unit(curr,prev),u2=unit(curr,next);
        const p1={x:curr.x+u1.x*r,y:curr.y+u1.y*r},p2={x:curr.x+u2.x*r,y:curr.y+u2.y*r};
        d+=(i===0?"M ":"L ")+p1.x+" "+p1.y+" Q "+curr.x+" "+curr.y+" "+p2.x+" "+p2.y;
      } else {
        d+=(i===0?"M ":"L ")+curr.x+" "+curr.y;
      }
    }
    d+=" Z";
  } else {
    for(let i=0;i<n;i++){
      const curr=ss[i];
      if(i===0||i===n-1){d+=(i===0?"M ":"L ")+curr.x+" "+curr.y;}
      else{
        const prev=ss[i-1],next=ss[i+1];
        const r=Math.min((_nullishCoalesce(pts[i].r, () => (0)))*zoom,Math.hypot(curr.x-prev.x,curr.y-prev.y)/2,Math.hypot(curr.x-next.x,curr.y-next.y)/2);
        if(r>0){
          const u1=unit(curr,prev),u2=unit(curr,next);
          const p1={x:curr.x+u1.x*r,y:curr.y+u1.y*r},p2={x:curr.x+u2.x*r,y:curr.y+u2.y*r};
          d+=" L "+p1.x+" "+p1.y+" Q "+curr.x+" "+curr.y+" "+p2.x+" "+p2.y;
        } else { d+=" L "+curr.x+" "+curr.y; }
      }
    }
  }
  return d;
}

// Circle hole as SVG arc path
function circlePath(cx,cy,r,pan,zoom){
  const s=w2s(cx,cy,pan,zoom),sr=r*zoom;
  return `M ${s.x-sr} ${s.y} A ${sr} ${sr} 0 1 0 ${s.x+sr} ${s.y} A ${sr} ${sr} 0 1 0 ${s.x-sr} ${s.y}`;
}

function holeD(hole,pan,zoom){
  if(hole.type==="circle")return circlePath(hole.cx,hole.cy,hole.r,pan,zoom);
  if(hole.pts)return buildPath(hole.pts,true,pan,zoom);
  return"";
}

const KS_COLORS=["#16a34a","#2563eb","#d97706","#7c3aed","#0891b2","#dc2626"];
const C={
  bg:"#f1f4f8",canvas:"#ffffff",hdr:"#1e293b",hdrFg:"#f8fafc",
  bar:"#f8fafc",border:"#cbd5e1",
  dark:"#1e293b",mid:"#475569",light:"#94a3b8",
  gridMin:"#e8ecf1",gridMaj:"#c8d0dc",
  panel:"#ffffff",card:"#f8fafc",
  btn:"#f1f5f9",btnFg:"#1e293b",
};
let _uid=100; const uid=()=>++_uid;

// Globales Button-Press CSS
const btnPressStyle = `
  button:active, label:active {
    transform: scale(0.95) !important;
    opacity: 0.8 !important;
    transition: transform 0.08s, opacity 0.08s !important;
  }
  button { transition: transform 0.08s, opacity 0.08s, background 0.15s; }
`;

function App(){
  const svgRef=useRef(null);
  const dragRef=useRef(null);
  const pinchRef=useRef(null);
  const panRef=useRef(null);
  const movedRef=useRef(false);
  const histRef=useRef([]);
  const pathsRef=useRef([]);
  const ksRef=useRef([]);
  const aksRef=useRef(1);

  const [zoom,setZoom]=useState(1.6);
  const [pan,setPan]=useState({x:280,y:300});
  const [tool,setTool]=useState("select");
  const [editMode,setEditMode]=useState(false);
  const [showDim,setShowDim]=useState(true);
  const [showPanel,setShowPanel]=useState(true);
  const [ortho,setOrtho]=useState(true);
  const [lenInput,setLenInput]=useState("");
  const [lenDir,setLenDir]=useState("right"); // right, left, up, down
  const [unit,setUnit]=useState("mm"); // "mm" | "cm" | "m"
  const [ksList,setKsList]=useState([{id:1,x:0,y:0}]);
  const [activeKS,setActiveKS]=useState(1);
  const [paths,setPaths]=useState([]);
  const [draft,setDraft]=useState(null);
  const [sel,setSel]=useState(null);
  const [selHole,setSelHole]=useState(null); // {parentId, holeId}
  const [dialog,setDialog]=useState(null);
  const [curKS,setCurKS]=useState({x:0,y:0});
  const [titleBlock,setTitleBlock]=useState(function(){
    var d=new Date();
    var dd=String(d.getDate()).padStart(2,"0");
    var mm=String(d.getMonth()+1).padStart(2,"0");
    return {projekt:"",zeichnungsnr:"",datum:dd+"."+mm+"."+d.getFullYear(),massstab:"1:50",name:"",firma:"",bemerkungen:""};
  });

  // ── Einheiten ─────────────────────────────────────────────
  // Intern immer mm. toDisp = mm→Anzeige, fromDisp = Eingabe→mm
  const toDisp=(mm)=>{
    if(unit==="cm") return parseFloat((mm/10).toFixed(2));
    if(unit==="m")  return parseFloat((mm/1000).toFixed(4));
    return Math.round(mm);
  };
  const fromDisp=(v)=>{
    const n=parseFloat(v)||0;
    if(unit==="cm") return Math.round(n*10);
    if(unit==="m")  return Math.round(n*1000);
    return Math.round(n);
  };
  const uStep=()=>unit==="cm"?"0.01":unit==="m"?"0.001":"1";
  const uLabel=()=>unit;
  // Für Anzeige: Wert + Einheit als String
  const fmt=(mm)=>`${toDisp(mm)}${unit}`;
  const fmtXY=(x,y)=>`${toDisp(x)}/${toDisp(y)}`;
  const [curAbs,setCurAbs]=useState({x:0,y:0});

  pathsRef.current=paths; ksRef.current=ksList; aksRef.current=activeKS;

  const SNAP=10;
  const getKS=()=>_nullishCoalesce(ksList.find(k=>k.id===activeKS), () => (ksList[0]));
  const kscol=()=>{const i=ksList.findIndex(k=>k.id===activeKS);return KS_COLORS[Math.max(0,i)%KS_COLORS.length];};

  const evXY=(e)=>{const r=svgRef.current.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{sx:t.clientX-r.left,sy:t.clientY-r.top};};

  function pushHist(){
    histRef.current=[...histRef.current.slice(-29),{paths:clone(pathsRef.current),ksList:clone(ksRef.current),activeKS:aksRef.current,draft:draft?clone(draft):null}];
  }
  function undo(){
    if(!histRef.current.length)return;
    const p=histRef.current[histRef.current.length-1];
    histRef.current=histRef.current.slice(0,-1);
    setPaths(p.paths);setKsList(p.ksList);setActiveKS(p.activeKS);setDraft(p.draft);setSel(null);setDialog(null);
  }

  function updateCursor(sx,sy){
    const w=s2w(sx,sy,pan,zoom),ks=getKS();
    setCurAbs({x:Math.round(w.x),y:Math.round(w.y)});
    setCurKS(toKS(w.x,w.y,ks));
  }

  // ── Touch ──────────────────────────────────────────────────
  const onTS=(e)=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pinchRef.current={d,zoom,pan:{...pan}};panRef.current=null;dragRef.current=null;return;
    }
    const{sx,sy}=evXY(e);
    if(editMode){
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<24){dragRef.current={pathId:path.id,ptIdx:i,isHole:false};movedRef.current=false;return;}
        }
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.pts){
            for(let i=0;i<hole.pts.length;i++){
              const s=w2s(hole.pts[i].x,hole.pts[i].y,pan,zoom);
              if(Math.hypot(sx-s.x,sy-s.y)<24){dragRef.current={pathId:path.id,holeId:hole.id,ptIdx:i,isHole:true};movedRef.current=false;return;}
            }
          }
        }
      }
    }
    if(tool==="select"&&!editMode)panRef.current={tx:e.touches[0].clientX,ty:e.touches[0].clientY,px:pan.x,py:pan.y};
  };

  const onTM=(e)=>{
    e.preventDefault();
    if(e.touches.length===2&&pinchRef.current){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const sc=d/pinchRef.current.d,cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const r=svgRef.current.getBoundingClientRect(),mx=cx-r.left,my=cy-r.top;
      const nz=Math.min(8,Math.max(0.15,pinchRef.current.zoom*sc)),ratio=nz/pinchRef.current.zoom;
      setPan({x:mx-ratio*(mx-pinchRef.current.pan.x),y:my-ratio*(my-pinchRef.current.pan.y)});setZoom(nz);return;
    }
    const{sx,sy}=evXY(e);
    if(dragRef.current){
      movedRef.current=true;
      const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);
      const{pathId,holeId,ptIdx,isHole}=dragRef.current;
      if(isHole){
        setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>h.id!==holeId?h:{...h,pts:h.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)})}));
      } else {
        setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,pts:p.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)}));
      }
      return;
    }
    if(panRef.current)setPan({x:panRef.current.px+e.touches[0].clientX-panRef.current.tx,y:panRef.current.py+e.touches[0].clientY-panRef.current.ty});
    updateCursor(sx,sy);
  };

  const onTE=()=>{
    if(dragRef.current&&!movedRef.current)openPtDialog(dragRef.current);
    pinchRef.current=null;panRef.current=null;dragRef.current=null;movedRef.current=false;
  };

  const onMD=(e)=>{
    const{sx,sy}=evXY(e);
    if(editMode){
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<14){dragRef.current={pathId:path.id,ptIdx:i,isHole:false};movedRef.current=false;return;}
        }
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.pts){for(let i=0;i<hole.pts.length;i++){
            const s=w2s(hole.pts[i].x,hole.pts[i].y,pan,zoom);
            if(Math.hypot(sx-s.x,sy-s.y)<14){dragRef.current={pathId:path.id,holeId:hole.id,ptIdx:i,isHole:true};movedRef.current=false;return;}
          }}
        }
      }
    }
    if(tool==="select"&&!editMode)panRef.current={tx:e.clientX,ty:e.clientY,px:pan.x,py:pan.y};
    movedRef.current=false;
  };

  const onMM=(e)=>{
    if(!svgRef.current)return;
    const{sx,sy}=evXY(e);updateCursor(sx,sy);
    if(dragRef.current&&e.buttons===1){
      movedRef.current=true;
      const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);
      const{pathId,holeId,ptIdx,isHole}=dragRef.current;
      if(isHole){setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,holes:(_nullishCoalesce(p.holes, () => ([]))).map(h=>h.id!==holeId?h:{...h,pts:h.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)})}));}
      else{setPaths(ps=>ps.map(p=>p.id!==pathId?p:{...p,pts:p.pts.map((pt,i)=>i===ptIdx?{...pt,x:wx,y:wy}:pt)}));}
      return;
    }
    if(panRef.current&&e.buttons===1){movedRef.current=true;setPan({x:panRef.current.px+e.clientX-panRef.current.tx,y:panRef.current.py+e.clientY-panRef.current.ty});}
  };

  const onMU=()=>{
    if(dragRef.current&&!movedRef.current)openPtDialog(dragRef.current);
    dragRef.current=null;panRef.current=null;movedRef.current=false;
  };

  const onWheel=(e)=>{
    e.preventDefault();const{sx,sy}=evXY(e);
    const nz=Math.min(8,Math.max(0.15,zoom*(e.deltaY>0?0.9:1.1))),r=nz/zoom;
    setPan({x:sx-r*(sx-pan.x),y:sy-r*(sy-pan.y)});setZoom(nz);
  };

  // ── Canvas click ──────────────────────────────────────────
  const onCanvasClick=(e)=>{
    if(!svgRef.current||dialog)return;
    if(movedRef.current){movedRef.current=false;return;}
    const{sx,sy}=evXY(e);
    const w=s2w(sx,sy,pan,zoom),wx=snapG(w.x,SNAP),wy=snapG(w.y,SNAP);

    if(editMode){
      // Prüfe ob Punkt getroffen (handled by onMU)
      for(const path of pathsRef.current){
        for(let i=0;i<path.pts.length;i++){
          const s=w2s(path.pts[i].x,path.pts[i].y,pan,zoom);
          if(Math.hypot(sx-s.x,sy-s.y)<22)return;
        }
      }
      // Segment antippen → Länge ändern
      for(const path of pathsRef.current){
        const n=path.closed?path.pts.length:path.pts.length-1;
        for(let i=0;i<n;i++){
          const a=path.pts[i],b=path.pts[(i+1)%path.pts.length];
          const sa=w2s(a.x,a.y,pan,zoom),sb=w2s(b.x,b.y,pan,zoom);
          const dx=sb.x-sa.x,dy=sb.y-sa.y,len2=dx*dx+dy*dy;
          if(len2===0)continue;
          const t=Math.max(0,Math.min(1,((sx-sa.x)*dx+(sy-sa.y)*dy)/len2));
          if(Math.hypot(sx-(sa.x+t*dx),sy-(sa.y+t*dy))<22){
            setDialog({type:"editlen",pathId:path.id,segIdx:i,len:mmLen(a,b),newLen:mmLen(a,b)});
            return;
          }
        }
      }
      // Klick INNERHALB eines Lochs → Loch bearbeiten
      for(const path of pathsRef.current){
        for(const hole of(_nullishCoalesce(path.holes, () => ([])))){
          if(hole.type==="circle"){
            const d2=Math.hypot(w.x-hole.cx,w.y-hole.cy);
            if(d2<hole.r){openHoleEditDialog(path.id,hole);return;}
          } else if(hole.pts&&pointInPoly(w.x,w.y,hole.pts)){
            openHoleEditDialog(path.id,hole);return;
          }
        }
      }
      setSel(null);return;
    }

    // Normal mode: Klick in geschlossene Fläche → Loch-Menü
    if(tool==="select"){
      for(const path of pathsRef.current){
        if(path.closed&&pointInPoly(w.x,w.y,path.pts)){
          const ks=getKS();
          const rel=toKS(w.x,w.y,ks);
          setDialog({type:"holemenu",pathId:path.id,relX:rel.x,relY:rel.y,absX:Math.round(w.x),absY:Math.round(w.y),ksId:activeKS,
            // circle defaults
            durchmesser:60,
            // rect defaults
            breite:80,hoehe:50,rTL:0,rTR:0,rBR:0,rBL:0,
            subtype:"circle"
          });
          return;
        }
      }
      setSel(null);return;
    }

    if(tool==="pfad"){
      if(!draft){setDraft({pts:[{id:uid(),x:wx,y:wy}]});}
      else{
        if(draft.pts.length>=3){
          const fs=w2s(draft.pts[0].x,draft.pts[0].y,pan,zoom);
          if(Math.hypot(sx-fs.x,sy-fs.y)<26){
            // Beim Schliessen: 90°-Eckpunkt automatisch einfügen wenn nötig
            const first=draft.pts[0];
            const last=draft.pts[draft.pts.length-1];
            const dx=Math.abs(last.x-first.x),dy=Math.abs(last.y-first.y);
            let finalPts=draft.pts;
            if(dx>1&&dy>1){
              // Beide Eckpunkt-Optionen prüfen
              const corner1={id:uid(),x:last.x,y:first.y};
              const corner2={id:uid(),x:first.x,y:last.y};
              const d1=Math.hypot(corner1.x-last.x,corner1.y-last.y)+Math.hypot(corner1.x-first.x,corner1.y-first.y);
              const d2=Math.hypot(corner2.x-last.x,corner2.y-last.y)+Math.hypot(corner2.x-first.x,corner2.y-first.y);
              const corner=d1<=d2?corner1:corner2;
              finalPts=[...draft.pts,corner];
            }
            pushHist();
            setPaths(p=>[...p,{id:uid(),pts:finalPts,closed:true,holes:[]}]);
            setDraft(null);setTool("select");setLenInput("");
            return;
          }
        }
        setDraft(d=>{var prev=d.pts[d.pts.length-1];var nx=wx,ny=wy;if(ortho&&prev){if(Math.abs(wx-prev.x)>=Math.abs(wy-prev.y)){ny=prev.y;}else{nx=prev.x;}}return{pts:[...d.pts,{id:uid(),x:nx,y:ny}]};});
      }
    } else if(tool==="ks"){
      pushHist();const nid=uid();
      setKsList(p=>[...p,{id:nid,x:wx,y:wy}]);setActiveKS(nid);setTool("select");
    }
  };

  function applyNewLength(){
    if(!dialog||dialog.type!=="editlen")return;
    const newLen=parseFloat(String(dialog.newLen).replace(",","."));
    if(isNaN(newLen)||newLen<=0)return;
    pushHist();
    setPaths(ps=>ps.map(p=>{
      if(p.id!==dialog.pathId)return p;
      const a=p.pts[dialog.segIdx];
      const b=p.pts[(dialog.segIdx+1)%p.pts.length];
      const dx=b.x-a.x,dy=b.y-a.y;
      const oldLen=Math.hypot(dx,dy);
      if(oldLen<0.001)return p;
      const factor=newLen/oldLen;
      const nbx=a.x+dx*factor,nby=a.y+dy*factor;
      const shiftX=nbx-b.x,shiftY=nby-b.y;
      // Verschiebe b und alle Punkte nach b mit
      const newPts=p.pts.map((pt,i)=>{
        if(i===(dialog.segIdx+1)%p.pts.length)return{...pt,x:nbx,y:nby};
        if(i>dialog.segIdx+1&&i<p.pts.length)return{...pt,x:pt.x+shiftX,y:pt.y+shiftY};
        return pt;
      });
      return{...p,pts:newPts};
    }));
    setDialog(null);
  }

  function finishDraft(closed){
    if(!draft||draft.pts.length<2){setDraft(null);return;}
    pushHist();setPaths(p=>[...p,{id:uid(),pts:draft.pts,closed,holes:[]}]);

  function exportDXF(){
    let dxf = "";

    // HEADER
    dxf += "0\nSECTION\n2\nHEADER\n";
    dxf += "9\n$ACADVER\n1\nAC1009\n";
    dxf += "9\n$INSUNITS\n70\n4\n"; // 4 = mm
    dxf += "0\nENDSEC\n";

    // TABLES
    dxf += "0\nSECTION\n2\nTABLES\n";
    dxf += "0\nTABLE\n2\nLAYER\n70\n2\n";
    dxf += "0\nLAYER\n2\n0\n70\n0\n62\n7\n6\nCONTINUOUS\n";
    dxf += "0\nLAYER\n2\nLOECHER\n70\n0\n62\n1\n6\nCONTINUOUS\n";
    dxf += "0\nENDTAB\n";
    dxf += "0\nENDSEC\n";

    // ENTITIES
    dxf += "0\nSECTION\n2\nENTITIES\n";

    paths.forEach(path => {
      if(path.pts.length < 2) return;

      // Hauptpfad als POLYLINE
      dxf += "0\nPOLYLINE\n";
      dxf += "8\n0\n";       // layer
      dxf += "66\n1\n";      // vertices follow
      dxf += `70\n${path.closed ? 1 : 0}\n`; // closed
      dxf += "10\n0.0\n20\n0.0\n30\n0.0\n";

      path.pts.forEach(p => {
        dxf += "0\nVERTEX\n";
        dxf += "8\n0\n";
        dxf += `10\n${p.x.toFixed(4)}\n`;
        dxf += `20\n${(-p.y).toFixed(4)}\n`;
        dxf += "30\n0.0\n";
      });
      dxf += "0\nSEQEND\n8\n0\n";

      // Löcher
      (_nullishCoalesce(path.holes, () => ( []))).forEach(hole => {
        if(hole.type === "circle"){
          dxf += "0\nCIRCLE\n";
          dxf += "8\nLOECHER\n";
          dxf += `10\n${hole.cx.toFixed(4)}\n`;
          dxf += `20\n${(-hole.cy).toFixed(4)}\n`;
          dxf += "30\n0.0\n";
          dxf += `40\n${hole.r.toFixed(4)}\n`;
        } else if(hole.pts && hole.pts.length >= 2){
          dxf += "0\nPOLYLINE\n";
          dxf += "8\nLOECHER\n";
          dxf += "66\n1\n70\n1\n";
          dxf += "10\n0.0\n20\n0.0\n30\n0.0\n";
          hole.pts.forEach(p => {
            dxf += "0\nVERTEX\n8\nLOECHER\n";
            dxf += `10\n${p.x.toFixed(4)}\n`;
            dxf += `20\n${(-p.y).toFixed(4)}\n`;
            dxf += "30\n0.0\n";
          });
          dxf += "0\nSEQEND\n8\nLOECHER\n";
        }
      });
    });

    // KS als POINT
    ksList.forEach((ks, i) => {
      dxf += "0\nPOINT\n";
      dxf += "8\n0\n";
      dxf += `10\n${ks.x.toFixed(4)}\n`;
      dxf += `20\n${(-ks.y).toFixed(4)}\n`;
      dxf += "30\n0.0\n";
    });

    dxf += "0\nENDSEC\n0\nEOF\n";

    const uri = "data:application/dxf;charset=utf-8," + encodeURIComponent(dxf);
    const a = document.createElement("a");
    a.setAttribute("href", uri);
    a.setAttribute("download", "zeichnung.dxf");
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

function loadScript(src, fallback) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = function() {
      if (fallback) {
        var s2 = document.createElement('script');
        s2.src = fallback;
        s2.onload = resolve;
        s2.onerror = reject;
        document.head.appendChild(s2);
      } else reject();
    };
    document.head.appendChild(s);
  });
}
